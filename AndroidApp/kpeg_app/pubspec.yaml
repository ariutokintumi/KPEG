name: kpeg_app
description: KPEG App - Ultra-compressed image format with AI reconstruction.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  provider: ^6.1.2

  # Camera & images
  image_picker: ^1.1.2
  image: ^4.5.2

  # Network
  http: ^1.2.1

  # Local storage
  sqflite: ^2.4.1
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.0

  # Sensors & location
  geolocator: ^13.0.2
  flutter_compass: ^0.8.1
  sensors_plus: ^6.1.1
  permission_handler: ^11.3.1

  # Face detection
  google_mlkit_face_detection: ^0.12.0

  # Device info
  device_info_plus: ^11.2.0
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
